<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>1Writer リダイレクト</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
         max-width: 520px; margin: 32px auto; padding: 0 20px; color: #333; line-height: 1.55; }
  h1 { font-size: 18px; margin-bottom: 4px; }
  .path { background: #f5f5f5; padding: 8px 12px; border-radius: 6px;
          word-break: break-all; font-size: 13px; color: #555; margin: 4px 0 16px; }
  .btn { display: block; margin: 10px 0; padding: 14px 18px;
         background: #3D5AA0; color: #fff; text-decoration: none;
         border-radius: 8px; text-align: center; font-weight: bold; font-size: 15px; }
  .btn.alt { background: #5A7FCC; }
  .btn.secondary { background: #888; }
  .btn.dropbox { background: #0061FF; }
  .err { color: #c62828; }
  .hint { font-size: 12px; color: #777; margin-top: 18px; }
</style>
</head>
<body>
<h1 id="msg">1Writer を起動中…</h1>
<p class="path" id="pathView"></p>

<a class="btn" id="ow_btn1" href="#">📖 1Writer で開く（標準）</a>
<a class="btn alt" id="ow_btn2" href="#">📖 1Writer で開く（先頭/付き）</a>
<a class="btn dropbox" id="db_btn" href="#" target="_blank">☁️ Dropbox で開く</a>

<p class="hint">
  「ファイルが見つかりません」と出る場合は、<br>
  ① 別パターンの「先頭/付き」ボタン、<br>
  ② Dropbox で開く、を順にお試しください。<br>
  どれが効くか分かれば設定を最適化できます。
</p>

<script>
(function () {
  const params = new URLSearchParams(location.search);
  let path = params.get('path');
  const root = params.get('root') || 'dropbox';

  const msg = document.getElementById('msg');
  const pathView = document.getElementById('pathView');
  const owBtn1 = document.getElementById('ow_btn1');
  const owBtn2 = document.getElementById('ow_btn2');
  const dbBtn = document.getElementById('db_btn');

  if (!path) {
    msg.textContent = 'エラー: path パラメータが指定されていません';
    msg.className = 'err';
    return;
  }

  // 先頭スラッシュ無し / 有り 両パターンを用意
  const noSlash = path.replace(/^\/+/, '');
  const withSlash = '/' + noSlash;

  pathView.textContent = withSlash;

  const owUrlNoSlash = 'onewriter://x-callback-url/open?path=' +
        encodeURIComponent(noSlash) + '&root=' + encodeURIComponent(root);
  const owUrlWithSlash = 'onewriter://x-callback-url/open?path=' +
        encodeURIComponent(withSlash) + '&root=' + encodeURIComponent(root);

  // Dropbox URL（先頭スラッシュ保持）
  const dbUrl = 'https://www.dropbox.com/home' +
        withSlash.split('/').map(encodeURIComponent).join('/');

  owBtn1.href = owUrlNoSlash;
  owBtn2.href = owUrlWithSlash;
  dbBtn.href = dbUrl;

  // 標準（先頭スラッシュ無し）で自動起動
  setTimeout(function () {
    window.location.href = owUrlNoSlash;
  }, 50);
})();
</script>
</body>
</html>
