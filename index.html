<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>1Writer リダイレクト</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
         max-width: 480px; margin: 40px auto; padding: 0 20px; color: #333; line-height: 1.6; }
  h1 { font-size: 18px; }
  .path { background: #f5f5f5; padding: 8px 12px; border-radius: 6px;
          word-break: break-all; font-size: 13px; color: #555; }
  .btn { display: block; margin: 12px 0; padding: 14px 18px;
         background: #3D5AA0; color: #fff; text-decoration: none;
         border-radius: 8px; text-align: center; font-weight: bold; }
  .btn.dropbox { background: #0061FF; }
  .err { color: #c62828; }
</style>
</head>
<body>
<h1 id="msg">1Writer を起動中…</h1>
<p class="path" id="pathView"></p>
<a class="btn" id="ow_btn" href="#">📖 1Writer で開く（再試行）</a>
<a class="btn dropbox" id="db_btn" href="#" target="_blank">☁️ Dropbox で開く</a>

<script>
(function () {
  const params = new URLSearchParams(location.search);
  // 仕様: path は "Dropbox/..." 形式（先頭にストレージソース名を含む）
  // 先頭の余分なスラッシュは除去
  let path = (params.get('path') || '').replace(/^\/+/, '');

  const msg = document.getElementById('msg');
  const pathView = document.getElementById('pathView');
  const owBtn = document.getElementById('ow_btn');
  const dbBtn = document.getElementById('db_btn');

  if (!path) {
    msg.textContent = 'エラー: path パラメータが指定されていません';
    msg.className = 'err';
    return;
  }

  pathView.textContent = path;

  // 1Writer 公式仕様: onewriter://x-callback-url/open?path=Dropbox/...
  const owUrl = 'onewriter://x-callback-url/open?path=' + encodeURIComponent(path);

  // Dropbox Web URL: 先頭の "Dropbox/" は不要。ビジネス書類以降のパスを使う。
  const dbPath = path.replace(/^Dropbox\//, '/');
  const dbUrl = 'https://www.dropbox.com/home' +
                dbPath.split('/').map(encodeURIComponent).join('/');

  owBtn.href = owUrl;
  dbBtn.href = dbUrl;

  // 即座に1Writerを起動
  setTimeout(function () { window.location.href = owUrl; }, 50);
})();
</script>
</body>
</html>
